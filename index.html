<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Unete al Next Gen Hub</h1>
    <p>El espacio de los proyectos de 20-y-tantos cobran vida. Registrate para conectar.</p>
    
    <hr>
    
    <form>
        <legend><strong><h2>Datos de Acceso</h2></strong></legend>

        <label><b>Nombre del usuario (o Gamertag):</b></label><br>
        <input type="text" placeholder="Ej: PixelMaster20"><br><br>

        <label><b>Correo electrónico:</b></label><br>
        <input type="text" placeholder="tu@email.com"><br><br>

        <label><b>Contraseña:</b></label><br>
        <input>

        <br><br>

        <legend><strong><h2>Sobre ti</h2></strong></legend>
        
        <label>¿Cuál es tu enfoque principal?</label><br>
        <select>
            <option value="programacion">Programación/Tech</option>
            <option value="Gaming">Gaming Pro</option>
            <option value="Creación de Contenido">Creación de Contenido</option>
            <option value="Fitnes & Salud">Fitnes & Salud</option>
            <option value="Emprendimient">Emprendimiento</option>
        </select><br><br>

        <label>Nivel de experiencia:</label><br>

        <input type="radio" id="novato" name="nivel" value="novato">
        <label for="novato">Explorando</label><br>

        <input type="radio" id="intermedio" name="nivel" value="intermedio">
        <label for="novato">En proceso</label><br>

        <input type="radio" id="pro" name="nivel" value="pro">
        <label for="novato">Ya monetizando</label><br><br>

        <label>Cuentanos un poco sobre tu setup o metas.</label><br>
        <textarea name="mensaje" rows="5" cols="50" placeholder="¿Que estas construyendo ahora mismo?"></textarea>



        




    </form>
    
</body>
</html>
